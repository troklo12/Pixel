<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — CinéVerde</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-split">
    <!-- Left Panel -->
    <div class="auth-panel-left d-none d-lg-flex">
      <div class="auth-left-overlay"></div>
      <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=800&h=1200&fit=crop" alt="Cinema" class="auth-bg-img" />
      <div class="auth-left-content">
        <a href="index.html" class="cv-logo"><span class="logo-icon">▶</span>CinéVerde</a>
        <blockquote class="auth-quote mt-auto">
          "Cinema is a mirror by which we often see ourselves."
          <cite>— Martin Scorsese</cite>
        </blockquote>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-panel-right">
      <div class="auth-form-container">
        <div class="auth-mobile-logo d-lg-none mb-4">
          <a href="index.html" class="cv-logo"><span class="logo-icon">▶</span>CinéVerde</a>
        </div>

        <span class="section-label">Welcome back</span>
        <h2 class="auth-title mt-1">Sign In</h2>
        <p class="text-muted mt-2">Don't have an account? <a href="register.html" class="cv-link">Create one free</a></p>

        <form id="loginForm" class="mt-4" novalidate>
          <div class="cv-form-group mb-4">
            <label class="cv-label">Email Address</label>
            <div class="cv-input-wrapper">
              <i class="bi bi-envelope cv-input-icon"></i>
              <input type="email" id="loginEmail" class="cv-input" placeholder="you@example.com" required />
            </div>
            <div class="invalid-feedback-cv" id="loginEmailError"></div>
          </div>

          <div class="cv-form-group mb-4">
            <div class="d-flex justify-content-between align-items-center">
              <label class="cv-label">Password</label>
              <a href="reset.html" class="cv-link-sm">Forgot password?</a>
            </div>
            <div class="cv-input-wrapper">
              <i class="bi bi-lock cv-input-icon"></i>
              <input type="password" id="loginPassword" class="cv-input" placeholder="Enter your password" required />
              <button type="button" class="cv-toggle-pw" onclick="togglePassword('loginPassword', this)">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="invalid-feedback-cv" id="loginPasswordError"></div>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input cv-check" type="checkbox" id="rememberMe" />
            <label class="form-check-label text-muted" for="rememberMe">Remember me for 30 days</label>
          </div>

          <button type="submit" class="btn btn-cv w-100 btn-lg">
            <span class="btn-text">Sign In</span>
            <span class="btn-loader d-none"><i class="bi bi-arrow-repeat spin"></i></span>
          </button>
        </form>

        <div class="auth-divider my-4"><span>or continue with</span></div>
        <div class="d-flex gap-3">
          <button class="btn btn-social w-50" onclick="socialLogin('Google')"><i class="bi bi-google me-2"></i>Google</button>
          <button class="btn btn-social w-50" onclick="socialLogin('Apple')"><i class="bi bi-apple me-2"></i>Apple</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Notification Modal -->
  <div class="modal fade" id="notifyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content cv-modal">
        <div class="modal-body text-center p-5">
          <div id="modalIcon" class="modal-big-icon mb-3"></div>
          <h5 id="modalTitle" class="modal-title-text"></h5>
          <p id="modalMessage" class="text-muted mt-2"></p>
          <button type="button" class="btn btn-cv mt-3 px-5" data-bs-dismiss="modal">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
