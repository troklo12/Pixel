<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies — CinéVerde</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav class="navbar navbar-expand-lg fixed-top cv-navbar">
    <div class="container-fluid px-4">
      <a class="navbar-brand cv-logo" href="index.html"><span class="logo-icon">▶</span>CinéVerde</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav mx-auto gap-1">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="movies.html">Movies</a></li>
          <li class="nav-item"><a class="nav-link" href="index.html#contact">Contact</a></li>
        </ul>
        <div class="d-flex align-items-center gap-3">
          <a href="login.html" class="btn btn-outline-cv">Sign In</a>
          <a href="register.html" class="btn btn-cv">Join Free</a>
        </div>
      </div>
    </div>
  </nav>

  <div class="page-header-dark">
    <div class="container pt-5">
      <div class="row align-items-end pt-5 pb-4">
        <div class="col-md-6">
          <span class="section-label">Browse</span>
          <h1 class="section-title mt-1">All Movies</h1>
        </div>
        <div class="col-md-6">
          <div class="search-inner mt-3">
            <i class="bi bi-search search-icon"></i>
            <input type="text" id="searchInputMovies" class="cv-search-input" placeholder="Search movies…" oninput="filterMoviesPage()" />
          </div>
        </div>
      </div>
      <!-- Genre Filter -->
      <div class="genre-filter pb-4">
        <button class="genre-btn active" onclick="filterGenre('All', this)">All</button>
        <button class="genre-btn" onclick="filterGenre('Drama', this)">Drama</button>
        <button class="genre-btn" onclick="filterGenre('Thriller', this)">Thriller</button>
        <button class="genre-btn" onclick="filterGenre('Sci-Fi', this)">Sci-Fi</button>
        <button class="genre-btn" onclick="filterGenre('Romance', this)">Romance</button>
        <button class="genre-btn" onclick="filterGenre('Action', this)">Action</button>
        <button class="genre-btn" onclick="filterGenre('Mystery', this)">Mystery</button>
      </div>
    </div>
  </div>

  <section class="py-5">
    <div class="container">
      <div class="row g-4" id="allMoviesGrid"></div>
      <div id="noResults" class="text-center py-5 d-none">
        <i class="bi bi-film" style="font-size:3rem;color:var(--cv-muted)"></i>
        <p class="mt-3 text-muted">No movies found. Try a different search.</p>
      </div>
    </div>
  </section>

  <footer class="cv-footer">
    <div class="container">
      <div class="row align-items-center py-4">
        <div class="col-md-4"><a class="cv-logo" href="index.html"><span class="logo-icon">▶</span>CinéVerde</a></div>
        <div class="col-md-4 text-center"><span class="text-muted small">© 2025 CinéVerde.</span></div>
        <div class="col-md-4 text-end">
          <a href="login.html" class="footer-link">Login</a>
          <a href="register.html" class="footer-link">Register</a>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
