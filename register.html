<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CinéVerde</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-body">

  <div class="auth-split">
    <!-- Left Panel -->
    <div class="auth-panel-left d-none d-lg-flex">
      <div class="auth-left-overlay"></div>
      <img src="https://images.unsplash.com/photo-1460881680858-30d872d5b530?w=800&h=1200&fit=crop" alt="Cinema" class="auth-bg-img" />
      <div class="auth-left-content">
        <a href="index.html" class="cv-logo"><span class="logo-icon">▶</span>CinéVerde</a>
        <div class="auth-perks mt-auto">
          <div class="perk-item"><i class="bi bi-check-circle-fill"></i> Unlimited streaming — all genres</div>
          <div class="perk-item"><i class="bi bi-check-circle-fill"></i> 4K Ultra HD quality</div>
          <div class="perk-item"><i class="bi bi-check-circle-fill"></i> No ads, ever</div>
          <div class="perk-item"><i class="bi bi-check-circle-fill"></i> First 30 days free</div>
        </div>
      </div>
    </div>

    <!-- Right Panel -->
    <div class="auth-panel-right">
      <div class="auth-form-container">
        <div class="auth-mobile-logo d-lg-none mb-4">
          <a href="index.html" class="cv-logo"><span class="logo-icon">▶</span>CinéVerde</a>
        </div>

        <span class="section-label">Get started</span>
        <h2 class="auth-title mt-1">Create Account</h2>
        <p class="text-muted mt-2">Already have an account? <a href="login.html" class="cv-link">Sign in</a></p>

        <form id="registerForm" class="mt-4" novalidate>
          <div class="cv-form-group mb-3">
            <label class="cv-label">Username</label>
            <div class="cv-input-wrapper">
              <i class="bi bi-person cv-input-icon"></i>
              <input type="text" id="regUsername" class="cv-input" placeholder="Choose a username" required />
            </div>
            <div class="invalid-feedback-cv" id="regUsernameError"></div>
          </div>

          <div class="cv-form-group mb-3">
            <label class="cv-label">Email Address</label>
            <div class="cv-input-wrapper">
              <i class="bi bi-envelope cv-input-icon"></i>
              <input type="email" id="regEmail" class="cv-input" placeholder="you@example.com" required />
            </div>
            <div class="invalid-feedback-cv" id="regEmailError"></div>
          </div>

          <div class="cv-form-group mb-3">
            <label class="cv-label">Password</label>
            <div class="cv-input-wrapper">
              <i class="bi bi-lock cv-input-icon"></i>
              <input type="password" id="regPassword" class="cv-input" placeholder="Minimum 8 characters" required oninput="updateStrength()" />
              <button type="button" class="cv-toggle-pw" onclick="togglePassword('regPassword', this)">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="password-strength mt-2">
              <div class="strength-bar">
                <div id="strengthFill" class="strength-fill"></div>
              </div>
              <span id="strengthLabel" class="strength-label"></span>
            </div>
            <div class="invalid-feedback-cv" id="regPasswordError"></div>
          </div>

          <div class="cv-form-group mb-4">
            <label class="cv-label">Confirm Password</label>
            <div class="cv-input-wrapper">
              <i class="bi bi-lock-fill cv-input-icon"></i>
              <input type="password" id="regConfirm" class="cv-input" placeholder="Repeat your password" required />
              <button type="button" class="cv-toggle-pw" onclick="togglePassword('regConfirm', this)">
                <i class="bi bi-eye"></i>
              </button>
            </div>
            <div class="invalid-feedback-cv" id="regConfirmError"></div>
          </div>

          <div class="form-check mb-4">
            <input class="form-check-input cv-check" type="checkbox" id="agreeTerms" required />
            <label class="form-check-label text-muted" for="agreeTerms">
              I agree to the <a href="#" class="cv-link">Terms of Service</a> and <a href="#" class="cv-link">Privacy Policy</a>
            </label>
            <div class="invalid-feedback-cv" id="agreeError"></div>
          </div>

          <button type="submit" class="btn btn-cv w-100 btn-lg">
            <span class="btn-text">Create Account</span>
            <span class="btn-loader d-none"><i class="bi bi-arrow-repeat spin"></i></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- Notification Modal -->
  <div class="modal fade" id="notifyModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content cv-modal">
        <div class="modal-body text-center p-5">
          <div id="modalIcon" class="modal-big-icon mb-3"></div>
          <h5 id="modalTitle" class="modal-title-text"></h5>
          <p id="modalMessage" class="text-muted mt-2"></p>
          <button type="button" class="btn btn-cv mt-3 px-5" data-bs-dismiss="modal" id="modalBtn">OK</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
